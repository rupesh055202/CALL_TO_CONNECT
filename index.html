<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login</title>
<style>
  
*{margin:0;padding:0;box-sizing:border-box;font-family:Segoe UI, sans-serif;}
body{
    height:100vh;
    background:#000;
    display:flex;
    justify-content:flex-end;
    align-items:center;
}

/* 🔥 Glass Header */
.site-header{
    position:fixed;
    top:0;left:0;
    width:100%;
    padding:14px 20px;
    background:rgba(18,21,28,0.32);
    backdrop-filter:blur(20px);
    border-bottom:1px solid rgba(255, 255, 255, 0.23);
    display:flex;
    justify-content:space-between;
    align-items:center;
    z-index:1000;
    box-shadow:0 4px 18px rgba(0,0,0,0.4);
}

/* Logo */
.logo img{
    width:200px;
    height:auto;
    object-fit:cover;
}

/* Navigation */
.header-nav ul{
    display:flex;
    list-style:none;
    gap:25px;
}
.header-nav ul li a{
    color:#e5e5e5;
    text-decoration:none;
    font-size:16px;
    transition:.3s;
}
.header-nav ul li a:hover,
.header-nav ul li a.active{color:#00ffab;font-weight:600;}

.menu-toggle{
    display:none;
    color:#fff;
    font-size:28px;
    cursor:pointer;
}

/* Background Video */
#bgVideo{
    position:fixed;
    top:0;left:0;
    width:100%;height:100%;
    object-fit:cover;
    z-index:-1;
}

/* Glass Login Box */
.form-box{
    width:380px;
    margin-right:80px;
    padding:38px;
    background:rgba(255,255,255,0.08);
    backdrop-filter:blur(15px);
    border-radius:18px;
    text-align:center;
    color:#fff;
    box-shadow:rgba(0,0,0,0.5) 0px 8px 24px;
    transition:.3s;
}
.form-box h2{margin-bottom:25px;font-size:28px;}
.form-box input{
    width:100%;
    padding:13px;
    margin:10px 0;
    border:none;
    border-radius:10px;
    background:rgba(255,255,255,0.25);
    color:#fff;
}
.btn{
    width:100%;padding:13px;margin-top:15px;
    border:none;border-radius:10px;
    background:#00ffab;
    font-size:16px;font-weight:bold;
    cursor:pointer;transition:0.3s;
}
.btn:hover{opacity:0.85;transform:scale(1.03);}
a{color:#fff;text-decoration:none;display:block;margin-top:12px;}
a:hover{text-decoration:underline;}

/* 📱 Responsive Styles */
@media(max-width:1024px){
    .form-box{
        margin-right:20px;
    }
}

@media(max-width:768px){
    body{
        justify-content:center;
    }
    .form-box{
        margin:0;
        width:90%;
        text-align:center;
    }

    .header-nav ul{
        position:absolute;
        top:70px;right:0;
        width:180px;
        background:rgba(0,0,0,0.6);
        backdrop-filter:blur(12px);
        display:none;
        flex-direction:column;
        padding:10px;
        border-radius:10px;
    }
    .header-nav ul.show{
        display:flex;
    }
    .menu-toggle{
        display:block;
    }
}

@media(max-width:480px){
    .logo img{
        width:40px;
    }
    .form-box{
        padding:30px;
        width:95%;
    }
    .form-box h2{font-size:24px;}
    .btn{font-size:14px;}
}

</style>

</head>

<body>

<!-- Header -->
<header class="site-header">
   <a href="www.google.com" class="logo" style="display:flex;align-items:center;gap:10px;text-decoration:none;">
        <img src="img\logo-white.png" alt="MyBrand" >
        <!--style="width:42px;height:42px;object-fit:cover;border-radius:8px;">
        <div class="logo-text">MyBrand</div>-->
    </a>
    
    <nav class="header-nav">
        <ul>
            <li><a href="login.html" class="active">Login</a></li>
            <li><a href="register.html">Signup</a></li>
            <li><a href="forgot-password.html">Forgot Password</a></li>
        </ul>
    </nav>
    <div class="menu-toggle" id="menu-btn">☰</div>
</header>

<!-- Video -->
<video autoplay muted loop id="bgVideo">
    <source src="img/bg.mp4" type="video/mp4">
</video>

<!-- Login Form -->
<div class="form-box">
    <h2>Welcome Back</h2>
    <input type="email" placeholder="Enter Email" required>
    <input type="password" placeholder="Enter Password" required>
    <button class="btn">Login</button>
    <a href="forgot-password.html">Forgot Password?</a>
</div>

<script>
const menuBtn=document.getElementById("menu-btn");
const nav=document.querySelector(".header-nav ul");
menuBtn.addEventListener("click",()=>nav.classList.toggle("show"));
</script>



  

</body>
</html>
